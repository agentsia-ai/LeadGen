# ============================================================
# LeadGen — Client Configuration Template
# Copy to config.yaml and customize for your use case.
#
# config.yaml is gitignored. Never commit a configured copy
# of this file to a public repository.
# ============================================================

# --- Identity ---
# Who is sending the outreach? This is injected into prompts and signatures.
client_name: "Your Business Name"
operator_name: "Your Name"
operator_title: "Your Title"
operator_email: "you@example.com"

# --- Ideal Customer Profile (ICP) ---
icp:
  # Industries to target (use plain English, as many or as few as you like)
  industries:
    - "industry one"
    - "industry two"
    - "industry three"

  # Company size range (employees)
  company_size:
    min_employees: 5
    max_employees: 200

  # Revenue range (optional, USD)
  annual_revenue:
    min: 500000
    max: 10000000

  # Geographic focus
  geography:
    countries: ["US"]
    states: []          # leave empty for all states
    cities: []          # leave empty for all cities

  # Pain points your offering addresses
  pain_points:
    - "pain point one"
    - "pain point two"

  # Keywords that indicate a good fit
  positive_signals:
    - "looking to scale"
    - "hiring operations manager"
    - "digital transformation"

  # Keywords that indicate a bad fit (disqualifiers)
  negative_signals:
    - "enterprise software"
    - "fortune 500"
    - "government"
    - "publicly traded"

# --- Value Proposition ---
# How you describe what you do. Used by the drafter to write outreach.
value_prop:
  headline: "One-line headline for what you offer"
  one_liner: >
    A 1–2 sentence value proposition that explains who you help, what
    outcome you deliver, and why it matters.
  proof_points:
    - "Concrete result or guarantee #1"
    - "Concrete result or guarantee #2"
    - "Concrete result or guarantee #3"

# --- Outreach Settings ---
outreach:
  # Email tone: formal | friendly-professional | casual
  tone: "friendly-professional"

  # Max emails per day (keep low to avoid spam flags)
  daily_email_limit: 30

  # Follow-up sequence timing (days after initial)
  follow_up_days: [3, 7, 14]

  # Max follow-ups per lead before marking cold
  max_follow_ups: 3

  # Require human approval before sending? Recommended: true.
  require_approval: true

  # Email signature template. {operator_name}, {operator_title},
  # {operator_email} are substituted at runtime.
  signature: |
    Best,
    {operator_name}
    {operator_title}
    {operator_email}

# --- AI Customization ---
# Optional: point at custom prompt files to override the engine defaults
# without subclassing. Paths are relative to the working directory.
# Leave commented to use the built-in generic prompts.
ai:
  model: "claude-sonnet-4-20250514"
  # scorer_prompt_path: "./prompts/scorer.txt"
  # drafter_prompt_path: "./prompts/drafter.txt"
  # followup_prompt_path: "./prompts/followup.txt"

# --- Lead Sources ---
sources:
  apollo:
    enabled: false
    results_per_search: 50

  hunter:
    enabled: false
    verify_emails: true

  pdl:
    enabled: false   # People Data Labs — 100 free credits/month
    # Set enabled: true and add PDL_API_KEY to .env

  web_crawl:
    enabled: false
    allowed_domains: []   # restrict crawling to specific domains

  csv_import:
    enabled: true
    watch_folder: "./imports"   # auto-import CSVs dropped here

# --- Scoring Weights ---
# How much each factor matters for lead score (must sum to 1.0)
scoring:
  industry_match: 0.30
  company_size_match: 0.20
  geography_match: 0.15
  pain_point_signals: 0.25
  contact_quality: 0.10

# Minimum score to include in outreach queue (0.0 - 1.0)
scoring_threshold: 0.60

# --- Database ---
database:
  # "sqlite" for local, "supabase" for cloud
  backend: "sqlite"
  sqlite_path: "./data/leadgen.db"
